name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEON_PROJECT_ID: curly-sound-15805517

# Required for Workload Identity Federation and PR comments (if added later)
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: framehouse_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Initialize Database Schema (Local)
        run: npm run payload migrate
        env:
          DATABASE_URI: postgres://postgres:password@localhost:5432/framehouse_ci
          PAYLOAD_SECRET: ci_secret

      - name: Lint Check
        run: npm run lint

      - name: Production Build Check
        run: npm run build
        env:
          DATABASE_URI: postgres://postgres:password@localhost:5432/framehouse_ci
          PAYLOAD_SECRET: ci_secret
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000

  # High-Fidelity Validation: Test migrations against a clone of real data
  validate-remote-migrations:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Neon CLI
        run: npm install -g neonctl

      - name: Determine Parent Branch
        id: parent
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            echo "branch=production" >> $GITHUB_OUTPUT
          else
            echo "branch=dev" >> $GITHUB_OUTPUT
          fi

      - name: Create Ephemeral Database Branch
        id: neon
        run: |
          BRANCH_NAME="gh-pr-${{ github.event.number }}-${{ github.run_id }}"
          echo "Creating branch $BRANCH_NAME from ${{ steps.parent.outputs.branch }}..."
          
          # Create the branch and capture the connection string
          neonctl branches create --name "$BRANCH_NAME" --parent "${{ steps.parent.outputs.branch }}" --project-id ${{ env.NEON_PROJECT_ID }}
          
          # Get the connection string for the new branch
          # Note: We use the default role for migrations
          CONNECTION_STRING=$(neonctl connection-string "$BRANCH_NAME" --project-id ${{ env.NEON_PROJECT_ID }})
          
          # Mask the connection string in logs
          echo "::add-mask::$CONNECTION_STRING"
          echo "db_uri=$CONNECTION_STRING" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Run Migrations against Ephemeral Branch
        run: |
          # Ensure SSL mode is enabled
          if [[ "${{ steps.neon.outputs.db_uri }}" != *"sslmode="* ]]; then
            EXPORT_URI="${{ steps.neon.outputs.db_uri }}?sslmode=require"
          else
            EXPORT_URI="${{ steps.neon.outputs.db_uri }}"
          fi
          
          echo "Verifying migrations against ephemeral clone of ${{ steps.parent.outputs.branch }}..."
          DATABASE_URI=$EXPORT_URI PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET_DEV }} npm run payload migrate
        env:
          NODE_ENV: production

      - name: Cleanup Ephemeral Branch
        if: always()
        run: |
          echo "Deleting ephemeral branch ${{ steps.neon.outputs.branch_name }}..."
          neonctl branches delete "${{ steps.neon.outputs.branch_name }}" --project-id ${{ env.NEON_PROJECT_ID }} --force
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    # Only deploy on push (merge) to main or dev
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Determine Environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "db_uri=${{ secrets.DATABASE_URI_PROD }}" >> $GITHUB_OUTPUT
            echo "payload_secret=${{ secrets.PAYLOAD_SECRET_PROD }}" >> $GITHUB_OUTPUT
            echo "bucket=framehouse-hub-prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "db_uri=${{ secrets.DATABASE_URI_DEV }}" >> $GITHUB_OUTPUT
            echo "payload_secret=${{ secrets.PAYLOAD_SECRET_DEV }}" >> $GITHUB_OUTPUT
            echo "bucket=framehouse-hub-dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js (Migration Runner)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Initialize Remote Database Schema (Persistent Env)
        run: |
          # Ensure SSL mode is enabled for Neon
          if [[ "${{ steps.env.outputs.db_uri }}" != *"sslmode="* ]]; then
            EXPORT_URI="${{ steps.env.outputs.db_uri }}?sslmode=require"
          else
            EXPORT_URI="${{ steps.env.outputs.db_uri }}"
          fi
          
          echo "Applying migrations to persistent ${{ steps.env.outputs.env_name }} database..."
          DATABASE_URI=$EXPORT_URI PAYLOAD_SECRET=${{ steps.env.outputs.payload_secret }} npm run payload migrate
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: us-central1-docker.pkg.dev/framehouse-hub/framehouse-hub/app:${{ steps.env.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: framehouse-hub-${{ steps.env.outputs.env_name }}
          image: us-central1-docker.pkg.dev/framehouse-hub/framehouse-hub/app:${{ steps.env.outputs.tag }}
          region: us-central1
          env_vars: |
            DATABASE_URI=${{ steps.env.outputs.db_uri }}
            PAYLOAD_SECRET=${{ steps.env.outputs.payload_secret }}
            GCS_BUCKET=${{ steps.env.outputs.bucket }}
            GCS_PROJECT_ID=framehouse-hub
            NEXT_PUBLIC_SERVER_URL=https://hub.framehouseworks.com
