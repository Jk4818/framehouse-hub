name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Concurrency Control: Prevents multiple deployments to the same environment from overlapping.
# For PRs, it cancels the previous run. For branch pushes, it queues them.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEON_PROJECT_ID: curly-sound-15805517

# Required for Workload Identity Federation and PR comments
permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # Enterprise Guardrail: Ensure main only accepts merges from dev
  guardrail:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Verify PR Source Branch
        if: github.head_ref != 'dev'
        run: |
          echo "### 🛑 Deployment Blocked" >> $GITHUB_STEP_SUMMARY
          echo "To maintain stability, 'main' only accepts merges from 'dev'." >> $GITHUB_STEP_SUMMARY
          echo "Please retarget your PR to 'dev' first." >> $GITHUB_STEP_SUMMARY
          exit 1

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: framehouse_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Initialize Database Schema (Local)
        run: npm run payload migrate
        env:
          DATABASE_URI: postgres://postgres:password@localhost:5432/framehouse_ci
          PAYLOAD_SECRET: ci_secret

      - name: Lint Check
        run: npm run lint

      - name: Production Build Check
        run: npm run build
        env:
          DATABASE_URI: postgres://postgres:password@localhost:5432/framehouse_ci
          PAYLOAD_SECRET: ci_secret
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000

  # High-Fidelity Validation: Test migrations against a clone of real data
  validate-remote-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Neon CLI
        run: npm install -g neonctl

      - name: Determine Parent Branch
        id: parent
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            echo "branch=production" >> $GITHUB_OUTPUT
          else
            echo "branch=dev" >> $GITHUB_OUTPUT
          fi

      - name: Create Ephemeral Database Branch
        id: neon
        run: |
          BRANCH_NAME="gh-pr-${{ github.event.number }}-${{ github.run_id }}"
          echo "Creating branch $BRANCH_NAME from ${{ steps.parent.outputs.branch }}..."

          # Create the branch and capture the connection string
          neonctl branches create --name "$BRANCH_NAME" --parent "${{ steps.parent.outputs.branch }}" --project-id ${{ env.NEON_PROJECT_ID }}

          # Get the connection string for the new branch
          CONNECTION_STRING=$(neonctl connection-string "$BRANCH_NAME" --project-id ${{ env.NEON_PROJECT_ID }})

          # Mask the connection string in logs
          echo "::add-mask::$CONNECTION_STRING"
          echo "db_uri=$CONNECTION_STRING" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Run Migrations against Ephemeral Branch
        run: |
          if [[ "$RAW_URI" != *"sslmode="* ]]; then
            export DATABASE_URI="${RAW_URI}?sslmode=require"
          else
            export DATABASE_URI="$RAW_URI"
          fi

          echo "Verifying migrations against ephemeral clone of ${{ steps.parent.outputs.branch }}..."
          npm run payload migrate
        env:
          NODE_ENV: production
          RAW_URI: ${{ steps.neon.outputs.db_uri }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET_DEV }}

      - name: Seed Ephemeral Database
        run: |
          if [[ "$RAW_URI" != *"sslmode="* ]]; then
            export DATABASE_URI="${RAW_URI}?sslmode=require"
          else
            export DATABASE_URI="$RAW_URI"
          fi

          echo "Verifying 'Day Zero' seeding against ephemeral clone..."
          npm run seed
        env:
          NODE_ENV: production
          RAW_URI: ${{ steps.neon.outputs.db_uri }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET_DEV }}
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000

      - name: Cleanup Ephemeral Branch
        if: always()
        run: |
          echo "Deleting ephemeral branch $BRANCH_NAME..."
          neonctl branches delete "$BRANCH_NAME" --project-id ${{ env.NEON_PROJECT_ID }} --force
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          BRANCH_NAME: ${{ steps.neon.outputs.branch_name }}

  # Development Pipeline: Automated deployment to the dev environment
  deploy-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    env:
      ENV_NAME: dev
      DOCKER_TAG: dev
      GCS_BUCKET: framehouse-hub-dev
      PUBLIC_URL: https://framehouse-hub-dev-588985538639.us-central1.run.app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Setup Node.js (Migration Runner)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Initialize Remote Database Schema (Dev)
        run: |
          if [[ "$RAW_URI" != *"sslmode="* ]]; then
            export DATABASE_URI="${RAW_URI}?sslmode=require"
          else
            export DATABASE_URI="$RAW_URI"
          fi

          echo "Applying migrations to persistent dev database..."
          npm run payload migrate
        env:
          NODE_ENV: production
          RAW_URI: ${{ secrets.DATABASE_URI_DEV }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET_DEV }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image (Dev)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: us-central1-docker.pkg.dev/framehouse-hub/framehouse-hub/app:${{ env.DOCKER_TAG }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=${{ env.PUBLIC_URL }}
            GCS_BUCKET=${{ env.GCS_BUCKET }}
            GCS_PROJECT_ID=framehouse-hub
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run (Dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: framehouse-hub-${{ env.ENV_NAME }}
          image: us-central1-docker.pkg.dev/framehouse-hub/framehouse-hub/app:${{ env.DOCKER_TAG }}
          region: us-central1
          env_vars: |
            DATABASE_URI=${{ secrets.DATABASE_URI_DEV }}
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET_DEV }}
            GCS_BUCKET=${{ env.GCS_BUCKET }}
            GCS_PROJECT_ID=framehouse-hub
            NEXT_PUBLIC_SERVER_URL=${{ env.PUBLIC_URL }}
            SEED_SECRET=${{ secrets.SEED_SECRET }}

  # Main Deployment Pipeline: Blueprint for production environment
  # Currently GATED until production infrastructure is established.
  deploy-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate
    # Gated: Only runs on push to main AND if PROD_READY secret is 'true'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.PROD_READY == 'true'
    env:
      ENV_NAME: prod
      DOCKER_TAG: latest
      GCS_BUCKET: framehouse-hub-prod
      PUBLIC_URL: https://hub.framehouseworks.com

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Setup Node.js (Migration Runner)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Initialize Remote Database Schema (Prod)
        run: |
          if [[ "$RAW_URI" != *"sslmode="* ]]; then
            export DATABASE_URI="${RAW_URI}?sslmode=require"
          else
            export DATABASE_URI="$RAW_URI"
          fi

          echo "Applying migrations to persistent prod database..."
          npm run payload migrate
        env:
          NODE_ENV: production
          RAW_URI: ${{ secrets.DATABASE_URI_PROD }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET_PROD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image (Prod)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: us-central1-docker.pkg.dev/framehouse-hub/framehouse-hub/app:${{ env.DOCKER_TAG }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=${{ env.PUBLIC_URL }}
            GCS_BUCKET=${{ env.GCS_BUCKET }}
            GCS_PROJECT_ID=framehouse-hub
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run (Prod)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: framehouse-hub-${{ env.ENV_NAME }}
          image: us-central1-docker.pkg.dev/framehouse-hub/framehouse-hub/app:${{ env.DOCKER_TAG }}
          region: us-central1
          env_vars: |
            DATABASE_URI=${{ secrets.DATABASE_URI_PROD }}
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET_PROD }}
            GCS_BUCKET=${{ env.GCS_BUCKET }}
            GCS_PROJECT_ID=framehouse-hub
            NEXT_PUBLIC_SERVER_URL=${{ env.PUBLIC_URL }}
            SEED_SECRET=${{ secrets.SEED_SECRET }}
